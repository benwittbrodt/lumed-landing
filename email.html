<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0; padding:0; background-color:#070C16; font-family:'Helvetica Neue', Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#070C16; padding:40px 20px;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="max-width:500px; width:100%;">
                    <!-- Icon -->
                    <tr>
                        <td align="center" style="padding-bottom:24px;">
                            <img src="http://lumedapp.com/ios_icon.png" alt="Lumed" width="72" height="72"
                                style="border-radius:18px; display:block;" />
                        </td>
                    </tr>
                    <!-- Heading -->
                    <tr>
                        <td align="center" style="padding-bottom:16px;">
                            <h1
                                style="margin:0; font-size:24px; font-weight:700; color:#E8EDF7; letter-spacing:-0.02em;">
                                You're on the list</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td align="center" style="padding-bottom:32px;">
                            <p style="margin:0; font-size:15px; line-height:1.7; color:#8B9CB8; max-width:400px;">
                                Thanks for signing up for Lumed updates. We'll let you know when the beta is ready and
                                share early access invites with our list first.
                            </p>
                        </td>
                    </tr>
                    <!-- Divider -->
                    <tr>
                        <td style="padding-bottom:24px;">
                            <hr style="border:none; border-top:1px solid rgba(255,255,255,0.09);" />
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td align="center">
                            <p style="margin:0; font-size:13px; color:#4C607A;">
                                Lumed — Your watch companion
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
